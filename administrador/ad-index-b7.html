<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloque 7 - Devolver título</title>
  <link rel="stylesheet" href="./ad-css/ad-admin.css" />
</head>
<body>
  <main class="ad-main">
    <header class="ad-header">
      <div>
        <p class="ad-eyebrow">Bloque 7</p>
        <h2>Devolver título</h2>
        <p class="ad-muted">Copia el título a historial, registra log y elimina el documento original para que el estudiante envíe nuevamente.</p>
      </div>
      <div class="ad-header-actions">
        <span class="ad-badge ad-badge-warning" id="ad-badge-firebase">Firebase: acción directa</span>
        <span class="ad-badge ad-badge-info" id="ad-badge-version">v1.0.0</span>
      </div>
    </header>

    <section class="ad-section ad-danger-zone" id="ad-seccion-devolver">
      <div class="ad-card">
        <div class="ad-form-grid ad-form-grid-3">
          <label>
            <span>Cédula</span>
            <input id="ad-devolver-cedula" type="text" placeholder="Cédula del estudiante" autocomplete="off" />
          </label>
          <label>
            <span>Motivo</span>
            <input id="ad-devolver-motivo" type="text" value="Reinicio de intento desde administración" autocomplete="off" />
          </label>
          <div class="ad-form-actions">
            <button class="ad-btn ad-btn-danger" id="ad-btn-devolver-titulo" type="button">Devolver título</button>
          </div>
        </div>
        <div id="ad-resultado-devolver" class="ad-result-box">Acción pendiente.</div>
      </div>
    </section>

    <section class="ad-section">
      <div class="ad-card">
        <div id="ad-panel-diagnostico" class="ad-diagnostic-box">Diagnóstico pendiente.</div>
      </div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="./ad-js/ad-config.js"></script>
  <script src="./ad-js/ad-firebase.service.js"></script>
  <script src="./ad-js/ad-titulos.service.js"></script>
  <script src="./ad-js/ad-devolver.app.js"></script>
</body>
</html>
