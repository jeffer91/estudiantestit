<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloque 8 - Reparar Firebase</title>
  <link rel="stylesheet" href="./ad-css/ad-admin.css" />
</head>
<body>
  <main class="ad-main">
    <header class="ad-header">
      <div>
        <p class="ad-eyebrow">Bloque 8</p>
        <h2>Reparar Firebase</h2>
        <p class="ad-muted">Corrige documentos de titulos con ID incorrecto y los normaliza a titulos / cedula.</p>
      </div>
      <div class="ad-header-actions">
        <span class="ad-badge ad-badge-warning" id="ad-badge-firebase">Firebase: acción directa</span>
        <span class="ad-badge ad-badge-info" id="ad-badge-version">v1.0.0</span>
      </div>
    </header>

    <section class="ad-section ad-danger-zone" id="ad-seccion-reparar">
      <div class="ad-card">
        <div class="ad-form-grid ad-form-grid-3">
          <label>
            <span>ID documento incorrecto</span>
            <input id="ad-reparar-doc-id" type="text" placeholder="2026-02__2026-08__1752918662" autocomplete="off" />
          </label>
          <div class="ad-form-actions">
            <button class="ad-btn ad-btn-secondary" id="ad-btn-detectar-reparaciones" type="button">Detectar reparación</button>
            <button class="ad-btn ad-btn-danger" id="ad-btn-reparar-documento" type="button">Reparar documento</button>
          </div>
        </div>
        <div id="ad-resultado-reparar" class="ad-result-box">Sin reparación ejecutada.</div>
      </div>
    </section>

    <section class="ad-section">
      <div class="ad-card">
        <div id="ad-panel-diagnostico" class="ad-diagnostic-box">Diagnóstico pendiente.</div>
      </div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="./ad-js/ad-config.js"></script>
  <script src="./ad-js/ad-firebase.service.js"></script>
  <script src="./ad-js/ad-titulos.service.js"></script>
  <script src="./ad-js/ad-reparar.app.js"></script>
</body>
</html>
