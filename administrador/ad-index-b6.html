<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloque 6 - Títulos enviados</title>
  <link rel="stylesheet" href="./ad-css/ad-admin.css" />
</head>
<body>
  <main class="ad-main">
    <header class="ad-header">
      <div>
        <p class="ad-eyebrow">Bloque 6</p>
        <h2>Títulos enviados</h2>
        <p class="ad-muted">Búsqueda por identificación, cruce con Estudiantes y visualización de propuestas enviadas.</p>
      </div>
      <div class="ad-header-actions">
        <span class="ad-badge ad-badge-warning" id="ad-badge-firebase">Firebase: pendiente</span>
        <span class="ad-badge ad-badge-info" id="ad-badge-version">v1.0.0</span>
      </div>
    </header>

    <section class="ad-section" id="ad-seccion-titulos">
      <div class="ad-card">
        <div class="ad-form-grid ad-form-grid-3">
          <label>
            <span>Cédula / identificación</span>
            <input id="ad-buscar-cedula" type="text" placeholder="1752918662" autocomplete="off" />
          </label>
          <div class="ad-form-actions">
            <button class="ad-btn ad-btn-primary" id="ad-btn-buscar-titulo" type="button">Buscar título</button>
            <button class="ad-btn ad-btn-secondary" id="ad-btn-listar-titulos" type="button">Listar títulos</button>
          </div>
        </div>
        <div id="ad-resultado-titulo" class="ad-result-box">Ingresa una identificación para buscar.</div>
        <div class="ad-table-wrap">
          <table class="ad-table">
            <thead><tr><th>Cédula</th><th>Estudiante</th><th>Carrera</th><th>Estado</th><th>Fecha envío</th></tr></thead>
            <tbody id="ad-tabla-titulos"><tr><td colspan="5" class="ad-empty">Sin títulos cargados.</td></tr></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="ad-section">
      <div class="ad-card">
        <div id="ad-panel-diagnostico" class="ad-diagnostic-box">Diagnóstico pendiente.</div>
      </div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="./ad-js/ad-config.js"></script>
  <script src="./ad-js/ad-firebase.service.js"></script>
  <script src="./ad-js/ad-titulos.service.js"></script>
  <script src="./ad-js/ad-titulos.app.js"></script>
</body>
</html>
