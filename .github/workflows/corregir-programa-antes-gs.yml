name: Corregir programa antes de Apps Script

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/corregir-programa-antes-gs.yml'

permissions:
  contents: write

jobs:
  corregir:
    if: github.event.head_commit.message == 'Ejecutar corrección del programa antes de Apps Script'
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Aplicar correcciones del programa
        run: node dev/corregir-programa-antes-gs.mjs
      - name: Verificar proyecto
        run: npm run check
      - name: Verificar build de Estudiantes
        run: npm run build:estudiantes
      - name: Limpiar archivos temporales
        run: rm -f dev/corregir-programa-antes-gs.mjs .github/workflows/corregir-programa-antes-gs.yml
      - name: Guardar corrección
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Corregir programa con el flujo publicado de Títulos"
          git push origin main
