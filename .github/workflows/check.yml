name: Verificar arquitectura

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verificar proyecto completo
        run: npm run check
      - name: Verificar build de Estudiantes
        run: npm run build:estudiantes
