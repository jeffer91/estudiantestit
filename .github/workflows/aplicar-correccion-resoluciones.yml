name: Aplicar corrección de resoluciones

on:
  push:
    branches: [main]
    paths:
      - 'dev/aplicar-correccion-resoluciones.py'

permissions:
  contents: write

jobs:
  corregir:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Aplicar corrección
        run: python dev/aplicar-correccion-resoluciones.py
      - name: Verificar proyecto
        run: npm run check
      - name: Verificar build de estudiantes
        run: npm run build:estudiantes
      - name: Limpiar archivos temporales
        run: rm -f dev/aplicar-correccion-resoluciones.py .github/workflows/aplicar-correccion-resoluciones.yml .github/workflows/corregir-consulta-resoluciones.yml
      - name: Guardar corrección
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add functions/api/acceso-estudiante.js dev/preparar-pages-local.mjs dev/preparar-pages-estudiantes.mjs dev/verificar-apps.mjs dev/verificar-logica-acceso.mjs package.json dev/aplicar-correccion-resoluciones.py .github/workflows/aplicar-correccion-resoluciones.yml .github/workflows/corregir-consulta-resoluciones.yml
          git commit -m "Corregir recuperación de Envios y Resoluciones en estudiantes"
          git push origin main
